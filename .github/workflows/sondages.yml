name: Suivi — refresh données quotidiennes

# Rafraîchit chaque jour les flux du module Suivre :
#   - notices de sondages (Commission des sondages)
#   - scrutins publics (Assemblée nationale, 17e législature)
#   - dossiers législatifs (Assemblée nationale)
#   - agenda électoral (curé)
# Commit les JSON dans public/suivi + public/sondages s'ils ont changé.
#
# Activation : repo sur GitHub + Settings → Actions → "Read and write
# permissions". Le GITHUB_TOKEN par défaut suffit (permission ci-dessous).

on:
  schedule:
    - cron: "30 6 * * *" # tous les jours 06:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh feeds
        run: |
          python3 scripts/pipeline/build-cncs-notices.py
          python3 scripts/pipeline/build-an-votes.py
          python3 scripts/pipeline/build-an-lois.py
          python3 scripts/pipeline/build-agenda.py
          python3 scripts/pipeline/build-veille.py

      - name: Commit if changed
        run: |
          CHANGED=$(git status --porcelain public/sondages public/suivi)
          if [[ -n "$CHANGED" ]]; then
            git config user.name "mouvancia-bot"
            git config user.email "bot@mouvancia.app"
            git add public/sondages public/suivi
            git commit -m "chore(suivi): refresh données $(date -u +%Y-%m-%d)"
            git push
            echo "✓ données mises à jour"
          else
            echo "= aucun changement"
          fi
