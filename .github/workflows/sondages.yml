name: Sondages — refresh notices CNCS

# Rafraîchit quotidiennement le registre des notices de la Commission des
# sondages et commit le JSON si quelque chose a changé.
#
# Activation : nécessite que le repo soit sur GitHub. Le GITHUB_TOKEN par défaut
# suffit (permission contents: write ci-dessous). Aucune action manuelle ensuite.

on:
  schedule:
    # Tous les jours à 06:30 UTC (08:30 Paris l'été, 07:30 l'hiver)
    - cron: "30 6 * * *"
  workflow_dispatch: {} # permet un déclenchement manuel depuis l'onglet Actions

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape CNCS notices
        run: python3 scripts/pipeline/build-cncs-notices.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain public/sondages/notices.json)" ]]; then
            git config user.name "mouvancia-bot"
            git config user.email "bot@mouvancia.app"
            git add public/sondages/notices.json
            git commit -m "chore(sondages): refresh notices CNCS $(date -u +%Y-%m-%d)"
            git push
            echo "✓ notices mises à jour"
          else
            echo "= aucune nouvelle notice"
          fi
